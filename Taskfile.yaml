---
version: '3'

set: [pipefail]
shopt: [globstar]

vars:
  BOOTSTRAP_DIR: '{{.ROOT_DIR}}/bootstrap'
  KUBERNETES_DIR: '{{.ROOT_DIR}}/kubernetes'
  SCRIPTS_DIR: '{{.ROOT_DIR}}/scripts'
  TALOS_DIR: '{{.ROOT_DIR}}/talos'
  PRIVATE_DIR: '{{.ROOT_DIR}}/.private'
  TALOSCONFIG: '{{.ROOT_DIR}}/talos/clusterconfig/talosconfig'

env:
  KUBECONFIG: '{{.ROOT_DIR}}/kubeconfig'
  SOPS_AGE_KEY_FILE: '{{.ROOT_DIR}}/age.key'
  TALOSCONFIG: '{{.TALOSCONFIG}}'

includes:
  bootstrap: .taskfiles/bootstrap
  docker: .taskfiles/docker
  infrastructure: .taskfiles/infrastructure
  talos: .taskfiles/talos
  template: .taskfiles/template

tasks:

  default: task --list

  validate:
    desc: Validate repository structure and required files
    cmd: bash {{.ROOT_DIR}}/scripts/validate.sh

  deps:
    desc: Install Helm dependencies for the cluster workflow
    cmds:
      - helm plugin list | grep -q 'secrets' || helm plugin install https://github.com/jkroepke/helm-secrets --verify=false
      - helm plugin list | grep -q 'diff' || helm plugin install https://github.com/databus23/helm-diff --verify=false
    preconditions:
      - which helm

  lint:
    desc: Run linters manually with auto-fixing where possible
    cmds:
      - tofu -chdir={{.ROOT_DIR}}/infra/terraform fmt -recursive
      - tofu -chdir={{.ROOT_DIR}}/terraform fmt -recursive
      - shfmt -w -i 2 -s {{.ROOT_DIR}}/scripts/*.sh {{.ROOT_DIR}}/scripts/lib/*.sh {{.ROOT_DIR}}/infra/docker/scripts/*.sh
      - yamllint {{.ROOT_DIR}}
      - shellcheck {{.ROOT_DIR}}/scripts/*.sh {{.ROOT_DIR}}/scripts/lib/*.sh {{.ROOT_DIR}}/infra/docker/scripts/*.sh
    preconditions:
      - which tofu shfmt yamllint shellcheck

  pre-commit:install:
    desc: Install pre-commit git hooks
    cmd: pre-commit install
    preconditions:
      - which pre-commit

  pre-commit:run:
    desc: Run all pre-commit hooks against all files
    cmd: pre-commit run --all-files
    preconditions:
      - which pre-commit

  tf:fmt:
    desc: Format both OpenTofu stacks
    cmds:
      - tofu -chdir={{.ROOT_DIR}}/infra/terraform fmt -recursive
      - tofu -chdir={{.ROOT_DIR}}/terraform fmt -recursive
    preconditions:
      - which tofu

  stack:render:
    desc: Render Docker runtime files from Doppler-managed secrets
    cmd: task docker:render

  stack:config:
    desc: Render and validate Docker Compose configuration using Doppler-managed secrets
    cmd: task docker:config

  stack:deploy:
    desc: Render runtime files and start the host-level Docker Compose stack using Doppler-managed secrets
    cmd: task docker:deploy

  infra:provision:
    desc: Apply both OpenTofu stacks in execution order
    cmd: task infrastructure:tf-apply

  talos:genconfig:
    desc: Generate Talos machine configuration
    cmd: task talos:generate-config

  talos:bootstrap:
    desc: Bootstrap Talos cluster and join nodes
    cmd: task bootstrap:talos

  apps:bootstrap:
    desc: Bootstrap cluster apps after Talos is healthy
    cmd: task bootstrap:apps

  sync-argo-bootstrap:
    desc: Apply the Argo CD app-of-apps bootstrap resources
    cmd: task infrastructure:argo-sync-bootstrap

  reconcile:
    desc: Force Argo to pull in changes from your Git repository
    cmd: task infrastructure:argo-reconcile

  platform:cilium:
    desc: Install and validate Cilium
    cmd: task infrastructure:platform-cilium

  platform:ingress:
    desc: Validate the Envoy Gateway ingress path
    cmd: task infrastructure:platform-ingress

  platform:argocd:
    desc: Install and validate Argo CD
    cmd: task infrastructure:platform-argocd

  platform:observability:
    desc: Install observability stack
    cmd: task infrastructure:platform-observability

  verify:cluster:
    desc: Run post-bootstrap verification checks
    cmd: task infrastructure:verify

  tf:init:
    desc: Initialize both OpenTofu stacks in execution order
    cmd: task infrastructure:tf-init

  tf:plan:
    desc: Plan node infrastructure first, then shared infra
    cmd: task infrastructure:tf-plan

  tf:apply:
    desc: Apply node infrastructure first, then shared infra
    cmd: task infrastructure:tf-apply

  tf:destroy:
    desc: Destroy shared infra first, then node infrastructure
    cmd: task infrastructure:tf-destroy

  cluster:sync-argo:
    desc: Apply the Argo bootstrap resources from this repo
    cmd: task infrastructure:argo-sync-bootstrap

  cluster:reconcile:
    desc: Force Argo to reconcile the cluster apps
    cmd: task infrastructure:argo-reconcile

  mgmt:init:
    desc: Bootstrap the management host from inside this repo
    cmd: bash {{.ROOT_DIR}}/scripts/management-init.sh
    preconditions:
      - test -f {{.ROOT_DIR}}/scripts/management-init.sh

  mgmt:bootstrap:
    desc: Bootstrap the management VM over SSH from this workstation
    cmd: bash {{.ROOT_DIR}}/scripts/bootstrap-management-vm.sh
    preconditions:
      - test -f {{.ROOT_DIR}}/scripts/bootstrap-management-vm.sh
