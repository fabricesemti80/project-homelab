[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
# pin tooling versions as implementation progresses
gitleaks = "latest"
tflint = "latest"
shellcheck = "latest"
yamllint = "latest"
shfmt = "latest"
prettier = "latest"
"python" = "3.14.4"
"uv" = "0.10.9"
"pipx" = "1.8.0"
"pipx:makejinja" = "2.8.2"
"aqua:opentofu/opentofu" = "latest"
"aqua:argoproj/argo-cd" = "3.3.8"
"aqua:budimanjojo/talhelper" = "3.1.8"
"aqua:cilium/cilium-cli" = "0.19.2"
"aqua:cli/cli" = "2.91.0"
"aqua:cloudflare/cloudflared" = "2026.3.0"
"aqua:cue-lang/cue" = "0.16.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:getsops/sops" = "3.12.2"
"aqua:go-task/task" = "3.50.0"
"aqua:helm/helm" = "4.1.4"
"aqua:helmfile/helmfile" = "1.4.4"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.8.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.0"
"aqua:mikefarah/yq" = "4.52.4"
"aqua:siderolabs/talos" = "1.12.4"
"aqua:yannh/kubeconform" = "0.7.0"
"aqua:viaduct-ai/kustomize-sops" = "4.4.0"
