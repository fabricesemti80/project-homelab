[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
# pin tooling versions as implementation progresses
gitleaks = "latest"
tflint = "latest"
shellcheck = "latest"
yamllint = "latest"
shfmt = "latest"
prettier = "latest"
"python" = "3.14.3"
"uv" = "0.10.9"
"pipx" = "1.8.0"
"pipx:makejinja" = "2.8.2"
"aqua:opentofu/opentofu" = "latest"
"aqua:argoproj/argo-cd" = "3.3.2"
"aqua:budimanjojo/talhelper" = "3.1.5"
"aqua:cilium/cilium-cli" = "0.19.2"
"aqua:cli/cli" = "2.87.3"
"aqua:cloudflare/cloudflared" = "2026.2.0"
"aqua:cue-lang/cue" = "0.16.0"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:getsops/sops" = "3.12.1"
"aqua:go-task/task" = "3.49.1"
"aqua:helm/helm" = "4.1.1"
"aqua:helmfile/helmfile" = "1.4.1"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.8.0"
"aqua:kubernetes/kubernetes/kubectl" = "1.35.2"
"aqua:mikefarah/yq" = "4.52.4"
"aqua:siderolabs/talos" = "1.12.4"
"aqua:yannh/kubeconform" = "0.7.0"
"aqua:viaduct-ai/kustomize-sops" = "4.4.0"

[tasks.validate]
description = "Validate repository structure and required files"
run = "bash scripts/validate.sh"

[tasks.deps]
description = "Install Helm dependencies for the cluster workflow"
run = [
  "helm plugin list | grep -q 'secrets' || helm plugin install https://github.com/jkroepke/helm-secrets --verify=false",
  "helm plugin list | grep -q 'diff' || helm plugin install https://github.com/databus23/helm-diff --verify=false"
]

[tasks."infra:provision"]
description = "Apply the cluster OpenTofu stack"
run = "task tofu:apply"

[tasks."talos:genconfig"]
description = "Generate Talos machine configuration"
run = "task talos:generate-config"

[tasks."talos:bootstrap"]
description = "Bootstrap Talos cluster and join nodes"
run = "task bootstrap:talos"

[tasks."apps:bootstrap"]
description = "Bootstrap cluster apps after Talos is healthy"
run = "task bootstrap:apps"

[tasks."platform:cilium"]
description = "Install and validate Cilium"
run = [
  "task sync-argo-bootstrap",
  "kubectl --namespace argo-system get applications.argoproj.io cilium",
  "kubectl --namespace kube-system rollout status daemonset/cilium --timeout=5m"
]

[tasks."platform:ingress"]
description = "Validate the Envoy Gateway ingress path"
run = [
  "task sync-argo-bootstrap",
  "kubectl --namespace argo-system get applications.argoproj.io envoy-gateway",
  "kubectl --namespace network rollout status deployment/envoy-gateway --timeout=5m"
]

[tasks."platform:argocd"]
description = "Install and validate Argo CD"
run = "task sync-argo-bootstrap"

[tasks."platform:observability"]
description = "Install observability stack"
run = [
  "task sync-argo-bootstrap",
  "kubectl --namespace argo-system get applications.argoproj.io kube-prometheus-stack"
]

[tasks."verify:cluster"]
description = "Run post-bootstrap verification checks"
run = [
  "kubectl get nodes -o wide",
  "talosctl --talosconfig talos/clusterconfig/talosconfig health"
]

[tasks."stack:render"]
description = "Render Docker runtime files from Doppler-managed secrets"
run = "doppler run --project project-homelab --config dev_homelab -- bash infra/docker/scripts/render-secrets.sh"

[tasks."stack:config"]
description = "Render and validate Docker Compose configuration using Doppler-managed secrets"
run = "doppler run --project project-homelab --config dev_homelab -- sh -lc 'bash infra/docker/scripts/render-secrets.sh && docker compose --project-directory infra/docker -f infra/docker/docker-compose.yml config --quiet'"

[tasks."stack:deploy"]
description = "Render runtime files and start the host-level Docker Compose stack using Doppler-managed secrets"
run = "doppler run --project project-homelab --config dev_homelab -- bash infra/docker/scripts/deploy.sh"

[tasks."tf:init"]
description = "Initialize both root OpenTofu stacks"
run = [
  "doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir=infra/terraform init",
  "task tofu:init"
]

[tasks."tf:plan"]
description = "Plan both root OpenTofu stacks"
run = [
  "doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir=infra/terraform plan",
  "task tofu:plan"
]

[tasks."tf:apply"]
description = "Apply both root OpenTofu stacks"
run = [
  "doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir=infra/terraform apply -auto-approve",
  "task tofu:apply"
]

[tasks."tf:destroy"]
description = "Destroy the imported cluster OpenTofu stack"
run = "task tofu:destroy"

[tasks."cluster:tf:init"]
description = "Initialize the imported cluster OpenTofu stack"
run = "task tofu:init"

[tasks."cluster:tf:plan"]
description = "Plan the imported cluster OpenTofu stack"
run = "task tofu:plan"

[tasks."cluster:tf:apply"]
description = "Apply the imported cluster OpenTofu stack"
run = "task tofu:apply"

[tasks."cluster:sync-argo"]
description = "Apply the Argo bootstrap resources from this repo"
run = "task sync-argo-bootstrap"

[tasks."cluster:reconcile"]
description = "Force Argo to reconcile the cluster apps"
run = "task reconcile"

[tasks."mgmt:init"]
description = "Bootstrap the management host from inside this repo"
run = "bash scripts/management-init.sh"

[tasks."mgmt:bootstrap"]
description = "Bootstrap the management VM over SSH from this workstation"
run = "bash scripts/bootstrap-management-vm.sh"

[tasks.lint]
description = "Run all linters manually with auto-fixing where possible"
run = [
  "tofu -chdir=infra/terraform fmt -recursive",
  "tofu -chdir=terraform fmt -recursive",
  "shfmt -w -i 2 -s scripts/*.sh scripts/lib/*.sh infra/docker/scripts/*.sh",
  "yamllint .",
  "shellcheck scripts/*.sh scripts/lib/*.sh infra/docker/scripts/*.sh"
]

[tasks."pre-commit:install"]
description = "Install pre-commit git hooks"
run = "pre-commit install"

[tasks."pre-commit:run"]
description = "Run all pre-commit hooks against all files"
run = "pre-commit run --all-files"

[tasks."tf:fmt"]
description = "Format both OpenTofu stacks"
run = [
  "tofu -chdir=infra/terraform fmt -recursive",
  "tofu -chdir=terraform fmt -recursive"
]
