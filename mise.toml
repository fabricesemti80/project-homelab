[tools]
# pin tooling versions as implementation progresses
gitleaks = "latest"
tflint = "latest"
shellcheck = "latest"
yamllint = "latest"
terraform = "latest"
shfmt = "latest"
prettier = "latest"
omnictl = "latest"

[tasks.validate]
description = "Validate repository structure and required files"
run = "bash scripts/validate.sh"

[tasks."infra:provision"]
description = "Provision Talos VMs on Proxmox"
run = "bash scripts/infra_provision.sh"

[tasks."talos:genconfig"]
description = "Generate Talos machine configuration"
run = "bash scripts/talos_genconfig.sh"

[tasks."talos:bootstrap"]
description = "Bootstrap Talos cluster and join nodes"
run = "bash scripts/talos_bootstrap.sh"

[tasks."platform:cilium"]
description = "Install and validate Cilium"
run = "bash scripts/platform_cilium.sh"

[tasks."platform:ingress"]
description = "Install and validate Traefik ingress"
run = "bash scripts/platform_ingress.sh"

[tasks."platform:argocd"]
description = "Install and validate Argo CD"
run = "bash scripts/platform_argocd.sh"

[tasks."platform:longhorn"]
description = "Install and validate Longhorn"
run = "bash scripts/platform_longhorn.sh"

[tasks."platform:observability"]
description = "Install observability stack"
run = "bash scripts/platform_observability.sh"

[tasks."verify:cluster"]
description = "Run post-bootstrap verification checks"
run = "bash scripts/verify_cluster.sh"

[tasks."docker:render"]
description = "Render Docker runtime files from .envrc"
run = "bash infra/docker/scripts/render-secrets.sh"

[tasks."docker:config"]
description = "Render and validate Docker Compose configuration"
run = "bash infra/docker/scripts/render-secrets.sh && docker compose --project-directory infra/docker -f infra/docker/docker-compose.yml config --quiet"

[tasks."docker:deploy"]
description = "Deploy host-level Docker services locally or to HOMELAB_DOCKER_HOST"
run = "bash infra/docker/scripts/deploy.sh"

[tasks."docker:omni:envrc"]
description = "Generate or rotate Omni certs, GPG key, Dex secret, and .envrc Omni block"
run = "bash infra/docker/scripts/render-omni-envrc.sh"

[tasks."omni:config"]
description = "Configure omnictl to connect directly to Omni (skip Cloudflare gRPC blocking)"
run = "bash -c 'mkdir -p ~/.talos/keys && omnictl config url https://10.0.40.61:8443'"

[tasks."tf:init"]
description = "Initialize Terraform in infra/terraform"
run = "terraform init"
dir = "infra/terraform"

[tasks."tf:plan"]
description = "Plan Terraform infrastructure changes"
run = "terraform plan"
dir = "infra/terraform"

[tasks."tf:apply"]
description = "Apply Terraform infrastructure changes"
run = "terraform apply -auto-approve"
dir = "infra/terraform"

[tasks.lint]
description = "Run all linters manually with auto-fixing where possible"
run = "mise run tf:fmt && shfmt -w -i 2 -s scripts/*.sh infra/docker/scripts/*.sh && yamllint . && shellcheck scripts/*.sh infra/docker/scripts/*.sh"

[tasks."pre-commit:install"]
description = "Install pre-commit git hooks"
run = "pre-commit install"

[tasks."pre-commit:run"]
description = "Run all pre-commit hooks against all files"
run = "pre-commit run --all-files"

[tasks."tf:fmt"]
description = "Format all Terraform files"
run = "terraform fmt -recursive"
dir = "infra/terraform"
