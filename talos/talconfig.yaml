---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.0.40.101:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.0.40.101"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s-ctrl-01"
    ipAddress: "10.0.40.90"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:79:b5:8f"
        dhcp: false
        addresses:
          - "10.0.40.90/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.40.1"
        mtu: 1500
        vip:
          ip: "10.0.40.101"
      - deviceSelector:
          hardwareAddr: "bc:24:11:ce:0c:fb"
        dhcp: false
        addresses:
          - "10.0.70.90/24"
        mtu: 1500
  - hostname: "k8s-ctrl-02"
    ipAddress: "10.0.40.91"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:95:de:4d"
        dhcp: false
        addresses:
          - "10.0.40.91/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.40.1"
        mtu: 1500
        vip:
          ip: "10.0.40.101"
      - deviceSelector:
          hardwareAddr: "bc:24:11:33:c5:5d"
        dhcp: false
        addresses:
          - "10.0.70.91/24"
        mtu: 1500
  - hostname: "k8s-ctrl-03"
    ipAddress: "10.0.40.92"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/376567988ad370138ad8b2698212367b8edcb69b5fd68c80be1f2ec7d603b4ba
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "bc:24:11:72:f8:31"
        dhcp: false
        addresses:
          - "10.0.40.92/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "10.0.40.1"
        mtu: 1500
        vip:
          ip: "10.0.40.101"
      - deviceSelector:
          hardwareAddr: "bc:24:11:16:28:ab"
        dhcp: false
        addresses:
          - "10.0.70.92/24"
        mtu: 1500
# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-registries.sops.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
