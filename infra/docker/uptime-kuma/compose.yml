services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    platform: ${HOMELAB_DOCKER_PLATFORM:-linux/amd64}
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.uptime-kuma.rule: Host(`${UPTIME_KUMA_HOSTNAME:-uptime.krapulax.dev}`)
      traefik.http.routers.uptime-kuma.entrypoints: web
      traefik.http.services.uptime-kuma.loadbalancer.server.port: "3001"
    networks:
      - proxy

networks:
  proxy:
    name: homelab_proxy

volumes:
  uptime_kuma_data:
    name: homelab_uptime_kuma_data
