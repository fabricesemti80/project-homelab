services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:latest
    platform: ${HOMELAB_DOCKER_PLATFORM:-linux/amd64}
    container_name: arcane
    restart: unless-stopped
    ports:
      - "3552:3552"
    environment:
      APP_URL: ${ARCANE_APP_URL:-https://arcane.krapulax.dev}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      ENCRYPTION_KEY: ${ARCANE_ENCRYPTION_KEY:?ARCANE_ENCRYPTION_KEY is required}
      JWT_SECRET: ${ARCANE_JWT_SECRET:?ARCANE_JWT_SECRET is required}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - arcane_data:/app/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.arcane.rule: Host(`${ARCANE_HOSTNAME:-arcane.krapulax.dev}`)
      traefik.http.routers.arcane.entrypoints: web
      traefik.http.services.arcane.loadbalancer.server.port: "3552"
    networks:
      - proxy

networks:
  proxy:
    name: homelab_proxy

volumes:
  arcane_data:
    name: homelab_arcane_data
