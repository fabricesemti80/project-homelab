services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    platform: ${HOMELAB_DOCKER_PLATFORM:-linux/amd64}
    container_name: cloudflared
    restart: unless-stopped
    user: "0"
    network_mode: host
    command:
      - tunnel
      - --no-autoupdate
      - --config
      - /etc/cloudflared/config.yml
      - run
    volumes:
      - ${HOMELAB_DOCKER_ROOT:-.}/runtime/secrets/cloudflared:/etc/cloudflared:ro
