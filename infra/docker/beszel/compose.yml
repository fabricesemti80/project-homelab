services:
  beszel:
    image: henrygd/beszel:latest
    platform: ${HOMELAB_DOCKER_PLATFORM:-linux/amd64}
    container_name: beszel
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      APP_URL: ${BESZEL_APP_URL:-https://beszel.krapulax.dev}
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    labels:
      traefik.enable: "true"
      traefik.http.routers.beszel.rule: Host(`${BESZEL_HOSTNAME:-beszel.krapulax.dev}`)
      traefik.http.routers.beszel.entrypoints: web
      traefik.http.services.beszel.loadbalancer.server.port: "8090"
    networks:
      - proxy

  beszel-agent:
    image: henrygd/beszel-agent:latest
    platform: ${HOMELAB_DOCKER_PLATFORM:-linux/amd64}
    container_name: beszel-agent
    restart: unless-stopped
    profiles:
      - agent
    network_mode: host
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: ${BESZEL_AGENT_HUB_URL:-http://localhost:8090}
      KEY: ${BESZEL_AGENT_KEY:-}
      TOKEN: ${BESZEL_AGENT_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel_socket:/beszel_socket

networks:
  proxy:
    name: homelab_proxy

volumes:
  beszel_data:
    name: homelab_beszel_data
  beszel_socket:
    name: homelab_beszel_socket
