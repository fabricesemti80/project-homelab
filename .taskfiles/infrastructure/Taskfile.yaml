---
version: '3'

tasks:

  argo-sync-bootstrap:
    desc: Apply the Argo CD app-of-apps bootstrap resources
    cmds:
      - kubectl --namespace argo-system apply --server-side --filename {{.ROOT_DIR}}/kubernetes/components/common/settings.yaml
      - kubectl --namespace argo-system apply --server-side --filename {{.ROOT_DIR}}/kubernetes/components/common/repositories.yaml
      - kubectl --namespace argo-system apply --server-side --filename {{.ROOT_DIR}}/kubernetes/components/common/apps.yaml
    preconditions:
      - test -f {{.KUBECONFIG}}
      - test -f {{.ROOT_DIR}}/kubernetes/components/common/apps.yaml
      - test -f {{.ROOT_DIR}}/kubernetes/components/common/repositories.yaml
      - test -f {{.ROOT_DIR}}/kubernetes/components/common/settings.yaml
      - which kubectl

  argo-reconcile:
    desc: Force Argo to pull in changes from your Git repository
    deps: [argo-sync-bootstrap]
    cmd: argocd app list --project kubernetes -o name | xargs -I {} argocd app wait {} --sync --timeout 300
    preconditions:
      - test -f {{.KUBECONFIG}}
      - which argocd

  platform-cilium:
    desc: Install and validate Cilium
    deps: [argo-sync-bootstrap]
    cmds:
      - kubectl --namespace argo-system get applications.argoproj.io cilium
      - kubectl --namespace kube-system rollout status daemonset/cilium --timeout=5m

  platform-ingress:
    desc: Validate the Envoy Gateway ingress path
    deps: [argo-sync-bootstrap]
    cmds:
      - kubectl --namespace argo-system get applications.argoproj.io envoy-gateway
      - kubectl --namespace network rollout status deployment/envoy-gateway --timeout=5m

  platform-argocd:
    desc: Install and validate Argo CD
    task: argo-sync-bootstrap

  platform-observability:
    desc: Install observability stack
    deps: [argo-sync-bootstrap]
    cmd: kubectl --namespace argo-system get applications.argoproj.io kube-prometheus-stack

  verify:
    desc: Run post-bootstrap verification checks
    cmds:
      - kubectl get nodes -o wide
      - talosctl --talosconfig {{.ROOT_DIR}}/talos/clusterconfig/talosconfig health
    preconditions:
      - test -f {{.KUBECONFIG}}
      - test -f {{.ROOT_DIR}}/talos/clusterconfig/talosconfig
      - which kubectl talosctl

  tf-init:
    desc: Initialize both OpenTofu stacks in execution order
    cmds:
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.ROOT_DIR}}/terraform init
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.ROOT_DIR}}/infra/terraform init
    preconditions:
      - which doppler tofu

  tf-plan:
    desc: Plan node infrastructure first, then shared infra
    cmds:
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.ROOT_DIR}}/terraform plan -out=tfplan
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.ROOT_DIR}}/infra/terraform plan -out=tfplan
    preconditions:
      - which doppler tofu
      - test -d {{.ROOT_DIR}}/terraform/.terraform
      - test -d {{.ROOT_DIR}}/infra/terraform/.terraform

  tf-apply:
    desc: Apply node infrastructure first, then shared infra
    cmds:
      - |
        cd {{.ROOT_DIR}}/terraform
        echo "Planning node infrastructure..."
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu plan -out=tfplan
        echo "Applying node infrastructure..."
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu apply tfplan
      - |
        cd {{.ROOT_DIR}}/infra/terraform
        echo "Planning shared infrastructure..."
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu plan -out=tfplan
        echo "Applying shared infrastructure..."
        doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu apply tfplan
    preconditions:
      - which doppler tofu
      - test -d {{.ROOT_DIR}}/terraform/.terraform
      - test -d {{.ROOT_DIR}}/infra/terraform/.terraform

  tf-destroy:
    desc: Destroy shared infra first, then node infrastructure
    cmds:
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.ROOT_DIR}}/infra/terraform destroy -auto-approve
      - doppler run --project project-homelab --config dev_homelab --name-transformer tf-var -- tofu -chdir={{.ROOT_DIR}}/terraform destroy -auto-approve
    preconditions:
      - which doppler tofu
      - test -d {{.ROOT_DIR}}/terraform/.terraform
      - test -d {{.ROOT_DIR}}/infra/terraform/.terraform

  rolling-restart-cluster-vms:
    desc: Reboot cluster VMs through Proxmox one at a time and wait for nodes to recover [PROXMOX_SSH_HOST=required]
    dir: '{{.ROOT_DIR}}'
    cmd: bash {{.ROOT_DIR}}/scripts/rolling-proxmox-restart.sh
    requires:
      vars: [PROXMOX_SSH_HOST]
    preconditions:
      - which kubectl
      - which ssh
      - test -f {{.ROOT_DIR}}/kubeconfig
