---
controllers:
  sabnzbd:
    strategy: RollingUpdate
    initContainers:
      whitelist-config:
        image:
          repository: docker.io/library/alpine
          tag: "3.22"
        command:
          - /bin/sh
          - -ec
        args:
          - |
            config_file="/config/sabnzbd.ini"
            whitelist="sabnzbd,sabnzbd.krapulax.dev"

            mkdir -p /config

            if [ ! -f "${config_file}" ]; then
              cat > "${config_file}" <<EOF
            [misc]
            host_whitelist = ${whitelist}
            EOF
              exit 0
            fi

            if grep -q '^host_whitelist *=.*' "${config_file}"; then
              sed -i "s/^host_whitelist *=.*/host_whitelist = ${whitelist}/" "${config_file}"
              exit 0
            fi

            if grep -q '^\[misc\]' "${config_file}"; then
              awk -v whitelist="${whitelist}" '
                BEGIN { inserted = 0 }
                {
                  print
                  if (!inserted && $0 == "[misc]") {
                    print "host_whitelist = " whitelist
                    inserted = 1
                  }
                }
                END {
                  if (!inserted) {
                    print "[misc]"
                    print "host_whitelist = " whitelist
                  }
                }
              ' "${config_file}" > "${config_file}.tmp"
              mv "${config_file}.tmp" "${config_file}"
              exit 0
            fi

            cat >> "${config_file}" <<EOF

            [misc]
            host_whitelist = ${whitelist}
            EOF
    containers:
      app:
        image:
          repository: lscr.io/linuxserver/sabnzbd
          tag: latest
        env:
          TZ: Europe/London
          PUID: "0"
          PGID: "0"
          UMASK: "002"
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8080
              initialDelaySeconds: 30
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 2Gi

defaultPodOptions:
  hostname: sabnzbd

service:
  app:
    controller: sabnzbd
    ports:
      http:
        port: 8080
        targetPort: 8080

persistence:
  config:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 2Gi
    globalMounts:
      - path: /config
  media:
    enabled: true
    existingClaim: media-library-pvc
    globalMounts:
      - path: /media
  downloads:
    enabled: true
    existingClaim: media-library-pvc
    globalMounts:
      - path: /downloads
        subPath: downloads/complete
  incomplete-downloads:
    enabled: true
    existingClaim: media-library-pvc
    globalMounts:
      - path: /incomplete-downloads
        subPath: downloads/incomplete
