---
controllers:
  immich:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: release
        env:
          TZ: Europe/London
          DB_HOSTNAME: database
          DB_USERNAME: postgres
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secrets
                key: IMMICH_DB_PASSWORD
          DB_DATABASE_NAME: immich
          REDIS_HOSTNAME: redis
          IMMICH_MACHINE_LEARNING_URL: http://machine-learning:3003
          UPLOAD_LOCATION: /data
        probes:
          liveness: &immich-probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/server/ping
                port: 2283
              initialDelaySeconds: 60
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 6
          readiness: *immich-probes
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "4"
            memory: 4Gi

  machine-learning:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/immich-app/immich-machine-learning
          tag: release
        env:
          TZ: Europe/London
        probes:
          liveness: &ml-probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 3003
              initialDelaySeconds: 120
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 6
          readiness: *ml-probes
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi

  redis:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: docker.io/valkey/valkey
          tag: 9
        probes:
          liveness: &redis-probes
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 6379
              initialDelaySeconds: 20
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *redis-probes
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi

  database:
    type: statefulset
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/immich-app/postgres
          tag: 14-vectorchord0.4.3-pgvectors0.2.0
        env:
          TZ: Europe/London
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secrets
                key: IMMICH_DB_PASSWORD
          POSTGRES_DB: immich
          POSTGRES_INITDB_ARGS: --data-checksums
        probes:
          liveness: &db-probes
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 5432
              initialDelaySeconds: 30
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 6
          readiness: *db-probes
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi

service:
  immich:
    controller: immich
    ports:
      http:
        port: 2283
        targetPort: 2283
  machine-learning:
    controller: machine-learning
    ports:
      http:
        port: 3003
        targetPort: 3003
  redis:
    controller: redis
    ports:
      redis:
        port: 6379
        targetPort: 6379
  database:
    controller: database
    ports:
      postgres:
        port: 5432
        targetPort: 5432

persistence:
  uploads:
    enabled: true
    existingClaim: media-library-pvc
    globalMounts:
      - path: /data
        subPath: immich
  external-library:
    enabled: true
    existingClaim: media-library-pvc
    globalMounts:
      - path: /external-library
        subPath: immich/library
        readOnly: true
  model-cache:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 10Gi
    advancedMounts:
      machine-learning:
        app:
          - path: /cache
  redis-data:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 2Gi
    advancedMounts:
      redis:
        app:
          - path: /data
  postgres-data:
    type: persistentVolumeClaim
    accessMode: ReadWriteMany
    storageClass: cephfs
    size: 20Gi
    advancedMounts:
      database:
        app:
          - path: /var/lib/postgresql/data
