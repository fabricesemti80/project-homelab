---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/hostname: photos-next.krapulax.dev
    external-dns.alpha.kubernetes.io/target: external.krapulax.dev
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - photos-next.krapulax.dev
  rules:
    - backendRefs:
        - name: immich
          namespace: media
          port: 2283
