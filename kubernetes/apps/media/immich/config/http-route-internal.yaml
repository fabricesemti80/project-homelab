---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-internal
  namespace: media
  annotations:
    external-dns.alpha.kubernetes.io/hostname: photos-internal.krapulax.dev
    external-dns.alpha.kubernetes.io/target: internal.krapulax.dev
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - photos-internal.krapulax.dev
  rules:
    - backendRefs:
        - name: immich
          namespace: media
          port: 2283
