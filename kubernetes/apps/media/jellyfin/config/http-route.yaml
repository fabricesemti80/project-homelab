---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyfin
  namespace: media
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - jelly.krapulax.dev
  rules:
    - backendRefs:
        - name: jellyfin
          namespace: media
          port: 8096
