---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beszel-agent
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: beszel-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beszel-agent
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
          operator: Exists
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      containers:
        - name: beszel-agent
          image: henrygd/beszel-agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LISTEN
              value: "45876"
            - name: KEY
              valueFrom:
                secretKeyRef:
                  key: BESZEL_AGENT_KEY
                  name: beszel-agent-secrets
            # Talos nodes do not expose a Docker socket, so keep the agent focused on node metrics.
            - name: DOCKER_HOST
              value: ""
            - name: DATA_DIR
              value: /var/lib/beszel-agent
          ports:
            - containerPort: 45876
              hostPort: 45876
              name: agent
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /var/lib/beszel-agent
              name: beszel-agent-data
      terminationGracePeriodSeconds: 10
      volumes:
        - name: beszel-agent-data
          hostPath:
            path: /var/lib/beszel-agent
            type: DirectoryOrCreate
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 100%
    type: RollingUpdate
