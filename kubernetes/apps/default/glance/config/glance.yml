# https://github.com/glanceapp/glance/blob/main/docs/themes.md#tucan
theme:
  background-color: 50 1 6
  primary-color: 24 97 58
  negative-color: 209 88 54

pages:
  - name: Dashboard
    columns:
      - size: small
        widgets:
          - type: clock
            time-format: "15:04"
          - type: calendar
          - type: weather
            location: London, United Kingdom
      - size: full
        widgets:
          - type: reddit
            subreddit: technology
          - type: hacker-news
            limit: 10
          - type: videos
            style: vertical-list
            channels: # https://www.streamweasels.com/%20tools/youtube-channel-id-and-%20user-id-convertor/ => to find ID
              - UCfTtcS6gPVcSeZXvgnFSKsA
              - UCDvxjEa8yz5FlQLwH5F05rQ
            limit: 10
      - size: small
        widgets:
          - type: search
          - type: bookmarks
            groups:
              - title: Cluster
                links:
                  - title: Argo CD
                    url: https://argo.${DOMAIN}
                  - title: Grafana
                    url: https://grafana.${DOMAIN}
                  - title: Echo
                    url: https://echo.${DOMAIN}
                  - title: Nginx Test
                    url: https://nginx-test.${DOMAIN}
              # - title: Infrastructure
              #   links:
              #     - title: Traefik
              #       url: https://traefik.${DOMAIN}
              #     - title: Portainer
              #       url: https://portainer.${DOMAIN}
              #     - title: Backrest
              #       url: https://backrest.${DOMAIN}
              #     - title: Gatus
              #       url: https://status.${DOMAIN}
              - title: Media
                links:
                  - title: Plex
                    url: https://plex.krapulax.net
                  # - title: Jellyfin
                  #   url: https://jellyfin.${DOMAIN}
                  # - title: Sonarr
                  #   url: https://sonarr.${DOMAIN}
                  # - title: Radarr
                  #   url: https://radarr.${DOMAIN}
