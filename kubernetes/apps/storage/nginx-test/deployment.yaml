---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: storage
  labels:
    app: nginx-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
        - name: nginx
          image: nginx:1.25.3
          ports:
            - containerPort: 80
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: PVC_NAME
              value: nginx-test-pvc
            - name: STORAGE_CLASS
              value: cephfs
            - name: MOUNT_PATH
              value: /usr/share/nginx/html
          volumeMounts:
            - name: nginx-storage
              mountPath: "/usr/share/nginx/html"
          command: ["/bin/bash", "-c"]
          args:
            - |
              cat > /usr/share/nginx/html/index.html << EOF
              <!DOCTYPE html>
              <html>
              <head>
                <title>nginx-test - CephFS Storage Test</title>
                <style>
                  body { font-family: Arial, sans-serif; margin: 40px; background-color: #f5f5f5; }
                  .container { background-color: white; padding: 30px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
                  h1 { color: #333; }
                  .info { background-color: #e8f4f8; padding: 15px; border-left: 4px solid #2196F3; margin: 20px 0; }
                </style>
              </head>
              <body>
                <div class="container">
                  <h1>Hello from Nginx on CephFS!</h1>
                  <div class="info">
                    <strong>Storage Class:</strong> ${STORAGE_CLASS}<br>
                    <strong>PVC Name:</strong> ${PVC_NAME}<br>
                    <strong>Mount Path:</strong> ${MOUNT_PATH}<br>
                    <strong>Namespace:</strong> ${NAMESPACE}<br>
                    <strong>Pod:</strong> ${POD_NAME}<br>
                    <strong>Node:</strong> ${NODE_NAME}
                  </div>
                  <p>This page is being served from a Kubernetes PVC using CephFS persistent storage.</p>
                </div>
              </body>
              </html>
              EOF
              nginx -g 'daemon off;'
      volumes:
        - name: nginx-storage
          persistentVolumeClaim:
            claimName: nginx-test-pvc
