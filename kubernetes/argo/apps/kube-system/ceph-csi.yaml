---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-csi-secret
  namespace: argo-system
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  project: kubernetes
  source:
    repoURL: "https://github.com/fabricesemti80/project-homelab.git"
    path: kubernetes/apps/kube-system/ceph-csi
    targetRevision: main
  destination:
    name: in-cluster
    namespace: kube-system
  syncPolicy:
    automated:
      allowEmpty: true
      prune: true
      selfHeal: true
    retry:
      limit: 1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
