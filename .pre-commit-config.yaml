repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml, --gitleaks-ignore-path=.gitleaksignore]

  - repo: local
    hooks:
      - id: terraform-fmt
        name: OpenTofu fmt
        language: system
        entry: mise exec -- tofu fmt -recursive
        files: \.tf$
        pass_filenames: false

      - id: terraform-tflint
        name: Terraform validate with tflint
        language: system
        entry: mise exec -- tflint --config=../../.tflint.hcl --chdir=infra/terraform
        files: ^infra/terraform/.*\.tf$
        pass_filenames: false

      - id: shfmt
        name: shfmt
        language: system
        entry: mise exec -- shfmt -w -i 2 -s
        types: [shell]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, json, toml]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint]
        exclude: ^(bootstrap/|kubernetes/|talos/|templates/|\.taskfiles/|Taskfile\.yaml$|cluster\.sample\.yaml$|nodes\.sample\.yaml$|reproduce_crd\.yaml$)
